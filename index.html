    :root {
        --bg: #0c0a1a;
        --surface: rgba(255,255,255,0.04);
        --surface-hover: rgba(255,255,255,0.08);
        --border: rgba(255,255,255,0.08);
        --text: #e2dff0;
        --text-muted: #9590ab;
        --accent-1: #6c5ce7;
        --accent-2: #a855f7;
        --accent-3: #ec4899;
        --gradient: linear-gradient(135deg, #6c5ce7, #a855f7, #ec4899);
    }

    body {
        font-family: 'DM Sans', -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.7;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
    }

    /* Ambient background glow */
    body::before {
        content: '';
        position: fixed;
        top: -40%;
        left: -20%;
        width: 80%;
        height: 80%;
        background: radial-gradient(ellipse, rgba(108,92,231,0.08) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
    }
    body::after {
        content: '';
        position: fixed;
        bottom: -30%;
        right: -20%;
        width: 70%;
        height: 70%;
        background: radial-gradient(ellipse, rgba(236,72,153,0.06) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
    }

    .container {
        position: relative;
        z-index: 1;
        max-width: 740px;
        margin: 0 auto;
        padding: 3rem 1.5rem 4rem;
    }

    /* Header */
    .header {
        text-align: center;
        margin-bottom: 3rem;
    }

    .logo {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 1.5rem;
        text-decoration: none;
    }

    .logo-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: var(--gradient);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        box-shadow: 0 4px 20px rgba(108,92,231,0.3);
    }

    .logo-text {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        background: var(--gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .header h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 0.4rem;
    }

    .header .subtitle {
        color: var(--text-muted);
        font-size: 0.95rem;
    }

    /* Language Switcher */
    .lang-switcher {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.4rem;
        margin: 2rem 0 2.5rem;
    }

    .lang-btn {
        padding: 0.4rem 0.85rem;
        border-radius: 100px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        font-family: 'DM Sans', sans-serif;
        font-size: 0.82rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.25s ease;
        white-space: nowrap;
    }

    .lang-btn:hover {
        background: var(--surface-hover);
        color: var(--text);
        border-color: rgba(255,255,255,0.15);
    }

    .lang-btn.active {
        background: var(--gradient);
        color: #fff;
        border-color: transparent;
        box-shadow: 0 2px 12px rgba(108,92,231,0.3);
    }

    /* Content */
    .policy-content {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 2.5rem 2rem;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
    }

    .policy-content h2 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.25rem;
        font-weight: 600;
        color: #fff;
        margin-top: 2rem;
        margin-bottom: 0.6rem;
        padding-bottom: 0.4rem;
        border-bottom: 1px solid var(--border);
    }

    .policy-content h2:first-child {
        margin-top: 0;
    }

    .policy-content h3 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--accent-2);
        margin-top: 1.5rem;
        margin-bottom: 0.5rem;
    }

    .policy-content p {
        color: var(--text);
        font-size: 0.92rem;
        margin-bottom: 0.8rem;
    }

    .policy-content ul, .policy-content ol {
        list-style: none;
        padding-left: 0;
        margin-bottom: 0.8rem;
    }

    .policy-content ul li {
        position: relative;
        padding-left: 1.4rem;
        font-size: 0.92rem;
        color: var(--text);
        margin-bottom: 0.35rem;
    }

    .policy-content ul li::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0.55rem;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent-2);
        opacity: 0.7;
    }

    .policy-content ol {
        counter-reset: item;
        padding-left: 0;
    }

    .policy-content ol li {
        position: relative;
        padding-left: 2rem;
        font-size: 0.92rem;
        color: var(--text);
        margin-bottom: 0.6rem;
        counter-increment: item;
    }

    .policy-content ol li::before {
        content: counter(item) ".";
        position: absolute;
        left: 0;
        color: var(--accent-2);
        font-weight: 600;
    }

    .effective-date {
        display: inline-block;
        background: rgba(168,85,247,0.1);
        border: 1px solid rgba(168,85,247,0.2);
        border-radius: 8px;
        padding: 0.35rem 0.8rem;
        font-size: 0.82rem;
        color: var(--accent-2);
        font-weight: 500;
        margin-bottom: 1.2rem;
    }

    .info-box {
        background: rgba(108,92,231,0.08);
        border: 1px solid rgba(108,92,231,0.15);
        border-radius: 12px;
        padding: 1.2rem 1.4rem;
        margin: 1rem 0;
    }

    .warning-box {
        background: rgba(236,72,153,0.08);
        border: 1px solid rgba(236,72,153,0.15);
        border-radius: 12px;
        padding: 1.2rem 1.4rem;
        margin: 1rem 0;
    }

    .contact-box {
        background: rgba(108,92,231,0.08);
        border: 1px solid rgba(108,92,231,0.15);
        border-radius: 12px;
        padding: 1.2rem 1.4rem;
        margin-top: 0.5rem;
    }

    .contact-box a {
        color: var(--accent-2);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
    }

    .contact-box a:hover {
        color: var(--accent-3);
    }

    .policy-content strong {
        color: #fff;
        font-weight: 600;
    }

    /* Footer */
    .footer {
        text-align: center;
        margin-top: 2.5rem;
        color: var(--text-muted);
        font-size: 0.8rem;
    }

    @media (max-width: 600px) {
        .container { padding: 2rem 1rem 3rem; }
        .header h1 { font-size: 1.6rem; }
        .policy-content { padding: 1.8rem 1.3rem; }
        .lang-btn { font-size: 0.76rem; padding: 0.35rem 0.7rem; }
    }

    /* Fade in */
    .policy-content, .lang-switcher { animation: fadeUp 0.6s ease both; }
    .lang-switcher { animation-delay: 0.1s; }
    .policy-content { animation-delay: 0.2s; }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* RTL Support */
    [dir="rtl"] .policy-content ul li {
        padding-left: 0;
        padding-right: 1.4rem;
    }

    [dir="rtl"] .policy-content ul li::before {
        left: auto;
        right: 0;
    }

    [dir="rtl"] .policy-content ol li {
        padding-left: 0;
        padding-right: 2rem;
    }

    [dir="rtl"] .policy-content ol li::before {
        left: auto;
        right: 0;
    }
</style>

};

let currentLang = 'en';

function renderLangSwitcher() {
    const switcher = document.getElementById('langSwitcher');
    switcher.innerHTML = Object.entries(POLICIES).map(([code, p]) =>
        `<button class="lang-btn ${code === currentLang ? 'active' : ''}" onclick="switchLang('${code}')">${p.flag} ${p.label}</button>`
    ).join('');
}

function switchLang(lang) {
    currentLang = lang;
    const p = POLICIES[lang];
    
    document.getElementById('page-title').textContent = p.title;
    document.getElementById('page-subtitle').textContent = p.subtitle;
    document.documentElement.lang = lang;
    
    if (lang === 'ar') {
        document.documentElement.dir = 'rtl';
    } else {
        document.documentElement.dir = 'ltr';
    }
    
    const content = document.getElementById('policyContent');
    content.innerHTML = `<div class="effective-date">${p.effective}</div>` +
        p.sections.map(s => `<h2>${s.heading}</h2>${s.body}`).join('');
    
    renderLangSwitcher();
}

// Initialize
renderLangSwitcher();
switchLang('en');
</script>
