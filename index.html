<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalerSwipe — Privacy Policy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0c0a1a;
            --surface: rgba(255,255,255,0.04);
            --surface-hover: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.08);
            --text: #e2dff0;
            --text-muted: #9590ab;
            --accent-1: #6c5ce7;
            --accent-2: #a855f7;
            --accent-3: #ec4899;
            --gradient: linear-gradient(135deg, #6c5ce7, #a855f7, #ec4899);
        }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(ellipse, rgba(108,92,231,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(ellipse, rgba(236,72,153,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 740px;
            margin: 0 auto;
            padding: 3rem 1.5rem 4rem;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 4px 20px rgba(108,92,231,0.3);
        }

        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.4rem;
        }

        .header .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Language Switcher */
        .lang-switcher {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.4rem;
            margin: 2rem 0 2.5rem;
        }

        .lang-btn {
            padding: 0.4rem 0.85rem;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .lang-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
            border-color: rgba(255,255,255,0.15);
        }

        .lang-btn.active {
            background: var(--gradient);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 2px 12px rgba(108,92,231,0.3);
        }

        /* Content */
        .policy-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .policy-content h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
            margin-top: 2rem;
            margin-bottom: 0.6rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border);
        }

        .policy-content h2:first-child {
            margin-top: 0;
        }

        .policy-content p {
            color: var(--text);
            font-size: 0.92rem;
            margin-bottom: 0.8rem;
        }

        .policy-content ul {
            list-style: none;
            padding-left: 0;
            margin-bottom: 0.8rem;
        }

        .policy-content ul li {
            position: relative;
            padding-left: 1.4rem;
            font-size: 0.92rem;
            color: var(--text);
            margin-bottom: 0.35rem;
        }

        .policy-content ul li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.55rem;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-2);
            opacity: 0.7;
        }

        .effective-date {
            display: inline-block;
            background: rgba(168,85,247,0.1);
            border: 1px solid rgba(168,85,247,0.2);
            border-radius: 8px;
            padding: 0.35rem 0.8rem;
            font-size: 0.82rem;
            color: var(--accent-2);
            font-weight: 500;
            margin-bottom: 1.2rem;
        }

        .contact-box {
            background: rgba(108,92,231,0.08);
            border: 1px solid rgba(108,92,231,0.15);
            border-radius: 12px;
            padding: 1.2rem 1.4rem;
            margin-top: 0.5rem;
        }

        .contact-box a {
            color: var(--accent-2);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .contact-box a:hover {
            color: var(--accent-3);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 2.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .container { padding: 2rem 1rem 3rem; }
            .header h1 { font-size: 1.6rem; }
            .policy-content { padding: 1.8rem 1.3rem; }
            .lang-btn { font-size: 0.76rem; padding: 0.35rem 0.7rem; }
        }

        /* Fade in */
        .policy-content, .lang-switcher { animation: fadeUp 0.6s ease both; }
        .lang-switcher { animation-delay: 0.1s; }
        .policy-content { animation-delay: 0.2s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

        sections: [
            { heading: "Введение", body: `<p>GalerSwipe («мы», «наш») — это приложение для управления фотогалереей, предназначенное для быстрой и интуитивной организации ваших фотографий. Настоящая Политика конфиденциальности объясняет, как мы собираем, используем и защищаем вашу информацию при использовании нашего приложения.</p>` },
            { heading: "Информация, которую мы собираем", body: `

                <p><strong>Информация о покупках:</strong> Транзакции подписок и покупок обрабатываются полностью Apple через App Store. Мы не собираем и не храним вашу платежную информацию.</p>` },

    fr: {

        title: "Politique de Confidentialité",
        subtitle: "Votre vie privée nous tient à cœur",
        effective: "Date d'entrée en vigueur : Mars 2025",
        sections: [
            { heading: "Introduction", body: `<p>GalerSwipe (« nous », « notre ») est une application de gestion de galerie photo conçue pour vous aider à organiser vos photos rapidement et intuitivement. Cette Politique de Confidentialité explique comment nous collectons, utilisons et protégeons vos informations lorsque vous utilisez notre application.</p>` },
            { heading: "Informations que nous collectons", body: `
                <p><strong>Photos et médias :</strong> GalerSwipe accède à la photothèque de votre appareil uniquement pour afficher, organiser et gérer vos photos. Vos photos sont traitées entièrement sur votre appareil et ne sont jamais téléchargées sur nos serveurs.</p>
                <p><strong>Face ID / Données biométriques :</strong> Si vous activez la fonction de dossier verrouillé, Face ID ou le code de l'appareil est utilisé pour l'authentification. Les données biométriques sont gérées entièrement par les frameworks d'Apple et ne sont ni consultées ni stockées par nous.</p>
                <p><strong>Données de localisation :</strong> Avec votre permission, nous pouvons accéder aux métadonnées des photos (y compris la localisation) pour afficher les fonctionnalités cartographiques. Ces données restent sur votre appareil.</p>
                <p><strong>Analyses d'utilisation :</strong> Nous collectons des statistiques d'utilisation anonymes pour améliorer l'expérience de l'application. Ces données ne peuvent pas être utilisées pour vous identifier personnellement.</p>
                <p><strong>Données publicitaires :</strong> Pour les utilisateurs gratuits, nous utilisons Google AdMob pour afficher des publicités. AdMob peut collecter des identifiants d'appareil et des données d'utilisation conformément à la politique de confidentialité de Google.</p>
                <p><strong>Informations d'achat :</strong> Les transactions d'abonnement et d'achat sont entièrement traitées par Apple via l'App Store. Nous ne collectons ni ne stockons vos informations de paiement.</p>` },
            { heading: "Comment nous utilisons vos informations", body: `<ul>
                <li>Pour fournir et améliorer les fonctionnalités principales de l'application</li>
                <li>Pour afficher des publicités personnalisées ou contextuelles (niveau gratuit)</li>
                <li>Pour générer des statistiques d'utilisation anonymes</li>
                <li>Pour traiter le statut de votre abonnement</li></ul>` },
            { heading: "Stockage des données et sécurité", body: `<p>Tout le traitement des photos, y compris la détection de doublons par IA, se fait localement sur votre appareil. Nous n'exploitons pas de serveurs stockant vos photos personnelles ou données biométriques. Les données analytiques anonymes sont stockées de manière sécurisée et transmises avec un chiffrement standard.</p>` },
            { heading: "Services tiers", body: `<p>Nous intégrons les services tiers suivants :</p><ul>
                <li><strong>Google AdMob :</strong> Publicité pour les utilisateurs gratuits</li>
                <li><strong>Apple StoreKit :</strong> Achats intégrés et abonnements</li></ul>
                <p>Chaque service tiers fonctionne selon sa propre politique de confidentialité.</p>` },
            { heading: "Vos droits", body: `<p>Vous pouvez révoquer l'accès à la photothèque, la localisation ou les autorisations de suivi à tout moment via les paramètres de votre appareil. La suppression de l'application supprime toutes les données stockées localement. Si vous êtes dans l'UE, vous disposez de droits supplémentaires en vertu du RGPD.</p>` },
            { heading: "Confidentialité des enfants", body: `<p>GalerSwipe ne s'adresse pas aux enfants de moins de 13 ans. Nous ne collectons pas sciemment d'informations personnelles auprès d'enfants.</p>` },
            { heading: "Modifications de cette politique", body: `<p>Nous pouvons mettre à jour cette Politique de Confidentialité de temps en temps. Les modifications seront publiées sur cette page avec une date d'entrée en vigueur mise à jour.</p>` },
            { heading: "Contactez-nous", body: `<div class="contact-box"><p>Pour toute question concernant cette Politique de Confidentialité, contactez-nous à :<br><a href="mailto:galerswipe@gmail.com">galerswipe@gmail.com</a></p></div>` }

            { heading: "Informazioni che raccogliamo", body: `

                <p><strong>Face ID / Dati biometrici:</strong> Se attivi la funzione cartella bloccata, Face ID o il codice del dispositivo viene utilizzato per l'autenticazione. I dati biometrici sono gestiti interamente dai framework di Apple e non vengono né consultati né memorizzati da noi.</p>

                <p><strong>Analisi dell'utilizzo:</strong> Raccogliamo statistiche di utilizzo anonime per migliorare l'esperienza dell'app. Questi dati non possono essere utilizzati per identificarti personalmente.</p>
                <p><strong>Dati pubblicitari:</strong> Per gli utenti gratuiti, utilizziamo Google AdMob per visualizzare annunci. AdMob può raccogliere identificatori del dispositivo e dati di utilizzo in conformità con la politica sulla privacy di Google.</p>
                <p><strong>Informazioni sugli acquisti:</strong> Le transazioni di abbonamento e acquisto sono elaborate interamente da Apple tramite l'App Store. Non raccogliamo né memorizziamo le tue informazioni di pagamento.</p>` },
            { heading: "Come utilizziamo le tue informazioni", body: `<ul>
                <li>Per fornire e migliorare le funzionalità principali dell'app</li>

                <li>Per elaborare lo stato del tuo abbonamento</li></ul>` },
            { heading: "Archiviazione dati e sicurezza", body: `<p>Tutta l'elaborazione delle foto, incluso il rilevamento dei duplicati basato su IA, avviene localmente sul tuo dispositivo. Non gestiamo server che memorizzano le tue foto personali o dati biometrici. I dati analitici anonimi vengono archiviati in modo sicuro e trasmessi con crittografia standard.</p>` },
            { heading: "Servizi di terze parti", body: `<p>Integriamo i seguenti servizi di terze parti:</p><ul>

            { heading: "I tuoi diritti", body: `<p>Puoi revocare l'accesso alla libreria foto, alla posizione o le autorizzazioni di tracciamento in qualsiasi momento tramite le impostazioni del tuo dispositivo. L'eliminazione dell'app rimuove tutti i dati memorizzati localmente. Se ti trovi nell'UE, hai diritti aggiuntivi ai sensi del GDPR.</p>` },
            { heading: "Privacy dei minori", body: `<p>GalerSwipe non è destinato a bambini di età inferiore ai 13 anni. Non raccogliamo consapevolmente informazioni personali dai bambini.</p>` },
            { heading: "Modifiche a questa politica", body: `<p>Potremmo aggiornare questa Informativa sulla Privacy di tanto in tanto. Eventuali modifiche saranno pubblicate su questa pagina con una data di entrata in vigore aggiornata.</p>` },
            { heading: "Contattaci", body: `<div class="contact-box"><p>Per qualsiasi domanda su questa Informativa sulla Privacy, contattaci a:<br><a href="mailto:galerswipe@gmail.com">galerswipe@gmail.com</a></p></div>` }

            { heading: "हम आपकी जानकारी का उपयोग कैसे करते हैं", body: `<ul>

let currentLang = 'en';

function renderLangSwitcher() {
    const switcher = document.getElementById('langSwitcher');
    switcher.innerHTML = Object.entries(POLICIES).map(([code, p]) =>
        `<button class="lang-btn ${code === currentLang ? 'active' : ''}" onclick="switchLang('${code}')">${p.flag} ${p.label}</button>`
    ).join('');
}

function switchLang(lang) {
    currentLang = lang;
    const p = POLICIES[lang];
    
    document.getElementById('page-title').textContent = p.title;
    document.getElementById('page-subtitle').textContent = p.subtitle;
    document.documentElement.lang = lang;
    
    if (lang === 'ar') {
        document.documentElement.dir = 'rtl';
    } else {
        document.documentElement.dir = 'ltr';
    }
    
    const content = document.getElementById('policyContent');
    content.innerHTML = `<div class="effective-date">${p.effective}</div>` +
        p.sections.map(s => `<h2>${s.heading}</h2>${s.body}`).join('');
    
    renderLangSwitcher();
}

// Initialize
renderLangSwitcher();
switchLang('en');
